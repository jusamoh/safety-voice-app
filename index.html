<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>글로벌 현장 안전 통역 콘솔</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; transition: all 0.3s ease; }
        
        /* 🔐 로그인 스크린 스타일 */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        .login-box h2 { margin-top: 0; color: #1a73e8; margin-bottom: 20px; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; }
        .login-input:focus { border-color: #1a73e8; }
        .login-btn { background-color: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background-color: #1557b0; }
        .error-msg { color: #dc3545; font-size: 14px; margin-bottom: 15px; display: none; }

        /* 기존 앱 UI 스타일 */
        #appContainer { display: none; } 
        .header { text-align: center; margin-bottom: 20px; }
        .header span.user-badge { background: #28a745; color: white; font-size: 12px; padding: 4px 8px; border-radius: 20px; vertical-align: middle; margin-left: 10px; }
        .control-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 700px; margin: 0 auto 20px; }
        
        .lang-section { margin-bottom: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; text-align: left;}
        .lang-section label { font-weight: bold; color: #333; margin-right: 10px; display: inline-block; margin-bottom: 5px;}
        select, input[type=range] { padding: 8px; border-radius: 5px; border: 1px solid #ccc; outline: none; cursor: pointer; }
        
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .checkbox-group label { font-size: 15px; background: #fff; padding: 8px 12px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer;}
        .add-lang-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .add-lang-btn { background-color: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .slider-box { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 10px; }
        .slider-item { flex: 1; min-width: 200px; background: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; }
        .slider-item label { font-size: 13px; color: #555; display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: normal;}
        .slider-item span { font-weight: bold; color: #1a73e8; }
        input[type=range] { width: 100%; cursor: pointer; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { flex: 1; min-width: 130px; font-size: 15px; padding: 12px 10px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; color: white;}
        .start-btn { background-color: #dc3545; }
        .viewer-btn { background-color: #1a73e8; }
        .clear-btn { background-color: #ffc107; color: #000; }
        .download-btn { background-color: #6c757d; }
        .qr-btn { background-color: #20c997; color: white; width: 100%; margin-top: 10px; }
        
        button.active { background-color: #28a745; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }

        .status-box { font-size: 16px; color: #fff; background: #6c757d; padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; transition: background 0.3s; }
        
        .dictation-container { padding: 15px; background-color: #2c3e50; border-radius: 8px; text-align: center; margin-bottom: 20px;}
        .live-dictation { min-height: 28px; color: #f1c40f; font-weight: bold; font-size: 18px; }
        .placeholder-text { color: #7f8c8d; font-style: italic; }

        /* 화면 분할 뷰 */
        .window-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .window { flex: 1; min-width: 100%; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; height: 50vh; max-height: 600px; }
        .window h3 { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .content-box { flex: 1; overflow-y: auto; padding: 15px; border: 1px solid #eee; background-color: #fdfdfd; border-radius: 8px; font-size: 16px; line-height: 1.6; scroll-behavior: smooth;}
        
        .sentence { margin-bottom: 15px; border-bottom: 1px dashed #eee; padding-bottom: 10px; position: relative;}
        .draft-text { color: #9e9e9e; font-style: italic; }
        .latest-text { color: #d93025; font-weight: bold; font-size: 18px; display: block; margin-top: 5px; }
        .original-text { font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
        .same-lang-text { color: #333; font-weight: bold; font-size: 18px; display: block; }
        .tts-btn { position: absolute; right: 0; top: 0; background: #e9ecef; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; color: #333; min-width: auto; }

        @media (min-width: 768px) { .window { min-width: 300px; max-width: 48%; } }

        /* 🌟 뷰어(청중) 모드 특화 스타일 */
        body.viewer-mode { padding: 5px; background-color: #000; color: #fff; } 
        body.viewer-mode .header, 
        body.viewer-mode .control-panel { display: none !important; }
        body.viewer-mode .window-container { gap: 5px; }
        body.viewer-mode .window { height: 95vh; max-height: none; box-shadow: none; border: 1px solid #ddd; background: #fff; color:#000; }
        body.viewer-mode .latest-text, body.viewer-mode .same-lang-text { font-size: 24px; } 
        
        #exitViewerBtn { display: none; position: fixed; bottom: 20px; right: 20px; background-color: rgba(0,0,0,0.6); color: white; border-radius: 50px; padding: 10px 20px; font-size: 14px; z-index: 1000; border: none; cursor: pointer;}
        body.viewer-mode #exitViewerBtn { display: block; }

        #reportBtn { display: none; position: fixed; bottom: 80px; right: 20px; background-color: #d32f2f; color: white; border-radius: 50px; padding: 15px 25px; z-index: 1000; border: none; font-weight: bold; font-size: 16px; cursor: pointer;}
        body.viewer-mode #reportBtn { display: block; }

        /* QR 모달 */
        #qrModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        .qr-box { background: white; padding: 30px; border-radius: 15px; text-align: center; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        .close-qr-btn { margin-top: 20px; background-color: #dc3545; }
    </style>
</head>
<body>

<!-- 🔐 로그인 스크린 -->
<div id="loginOverlay">
    <div class="login-box">
        <h2>🚀 AI 안전 통역 로그인</h2>
        <p style="color:#666; font-size:14px; margin-bottom:20px;">유료 구독 사용자만 이용 가능한 시스템입니다.</p>
        <div id="errorMsg" class="error-msg">아이디 또는 비밀번호가 틀렸습니다.</div>
        <input type="text" id="username" class="login-input" placeholder="아이디 (예: admin)">
        <input type="password" id="password" class="login-input" placeholder="비밀번호" onkeyup="if(event.key==='Enter') attemptLogin()">
        <button class="login-btn" onclick="attemptLogin()">로그인</button>
    </div>
</div>

<div id="appContainer">
    <div class="header">
        <h1>🌍 글로벌 다국어 현장 안전 콘솔 🎙️<span id="userBadge" class="user-badge"></span></h1>
    </div>

    <div class="control-panel">
        <div class="lang-section">
            <div style="margin-bottom: 15px; border-bottom: 1px dashed #ccc; padding-bottom: 15px;">
                <label>🗣️ 1. 관리자(발표자) 언어:</label>
                <select id="speakerLang">
                    <option value="ko" selected>🇰🇷 한국어</option>
                    <option value="en">🇺🇸 영어</option>
                    <option value="id">🇮🇩 인니어</option>
                    <option value="ja">🇯🇵 일본어</option>
                    <option value="zh">🇨🇳 중국어</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px; border-bottom: 1px dashed #ccc; padding-bottom: 15px;">
                <label>🌐 2. 번역 화면 선택:</label>
                <div class="checkbox-group" id="targetCheckboxes">
                    <label><input type="checkbox" value="ko" checked> 🇰🇷 한국어</label>
                    <label><input type="checkbox" value="en" checked> 🇺🇸 영어</label>
                    <label><input type="checkbox" value="zh" checked> 🇨🇳 중국어</label>
                    <label><input type="checkbox" value="ja" checked> 🇯🇵 일본어</label>
                </div>
                <div class="add-lang-box">
                    <span style="font-size: 14px; color: #555;">➕ 현장 작업자 언어 추가:</span>
                    <select id="extraLangSelect" style="padding: 5px; font-size: 14px;">
                        <option value="id">🇮🇩 인니어</option>
                        <option value="vi">🇻🇳 베트남어</option>
                        <option value="es">🇪🇸 스페인어</option>
                        <option value="fr">🇫🇷 프랑스어</option>
                        <option value="de">🇩🇪 독일어</option>
                        <option value="th">🇹🇭 태국어</option>
                        <option value="mn">🇲🇳 몽골어</option>
                        <option value="uz">🇺🇿 우즈베크어</option>
                        <option value="ru">🇷🇺 러시아어</option>
                        <option value="ar">🇸🇦 아랍어</option>
                        <option value="tl">🇵🇭 필리핀어(타갈로그)</option>
                    </select>
                    <button class="add-lang-btn" onclick="addExtraLanguage()">화면에 추가</button>
                </div>
            </div>

            <div style="margin-bottom: 15px; border-bottom: 1px dashed #ccc; padding-bottom: 15px;">
                <label>⚙️ 3. 통역 최적화 설정:</label>
                <div class="slider-box">
                    <div class="slider-item">
                        <label>침묵 감지 <span id="endpointVal">0.7초</span></label>
                        <input type="range" id="endpointingSlider" min="100" max="1500" step="100" value="700" 
                               oninput="document.getElementById('endpointVal').innerText = (this.value/1000).toFixed(1) + '초'">
                    </div>
                    <div class="slider-item">
                        <label>최대 문장 길이 <span id="maxCharVal">50자</span></label>
                        <input type="range" id="maxCharSlider" min="30" max="150" step="10" value="50" 
                               oninput="document.getElementById('maxCharVal').innerText = this.value + '자'">
                    </div>
                </div>
            </div>

            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label style="margin:0;">📝 4. 현장 안전 용어집 (선택):</label>
                    <button style="background-color: #17a2b8; padding: 5px 10px; font-size: 13px; min-width: auto; border: none; color: white; border-radius: 5px; cursor: pointer;" onclick="document.getElementById('glossaryFile').click()">📁 불러오기</button>
                    <input type="file" id="glossaryFile" accept=".txt,.csv" style="display: none;" onchange="loadGlossaryFile(event)">
                </div>
                <textarea id="glossaryInput" rows="2" style="width: 100%; border-radius: 5px; padding: 10px; border: 1px solid #ccc;" placeholder="예: 비계=Scaffolding"></textarea>
            </div>
            
            <button class="qr-btn" onclick="showQRCode()">📱 작업자용 스마트폰 QR코드 띄우기</button>
        </div>

        <div id="statusBox" class="status-box">시스템 대기 중</div>

        <div class="btn-group">
            <button id="speakerBtn" class="start-btn" onclick="toggleConnection('speaker')">🎤 [PC] 마이크 켜기</button>
            <button id="viewerBtn" class="viewer-btn" onclick="toggleConnection('viewer')">👀 [내 PC] 뷰어 모드 전환</button>
            <button class="clear-btn" onclick="clearAllLogs()">🗑️ 화면 지우기</button>
            <button id="downloadBtn" class="download-btn" onclick="downloadTranscript()">📄 기록 저장</button>
            <button class="clear-btn" style="background:#dc3545; color:#fff;" onclick="logout()">🔒 로그아웃</button>
        </div>
        
        <div class="dictation-container">
            <div id="liveDictation" class="live-dictation"><span class="placeholder-text">대기 중...</span></div>
        </div>
    </div>

    <!-- 반응형 번역 창 컨테이너 -->
    <div class="window-container" id="windowContainer"></div>
</div>

<button id="exitViewerBtn" onclick="exitViewerMode()">⚙️ 설정 패널 열기</button>
<button id="reportBtn" onclick="toggleReportMode()">🚨 위험 상황 보고</button>

<div id="qrModal">
    <div class="qr-box">
        <h2>스마트폰 카메라로 스캔하세요</h2>
        <p style="color: #666; font-size: 14px;">작업자는 별도 로그인 없이 즉시 접속됩니다.</p>
        <p style="color: #666; font-size: 12px; margin-bottom: 0;">현재 접속 주소: <span id="currentUrlTxt" style="font-weight:bold;"></span></p>
        <div id="qrcode"></div>
        <p style="color: #d93025; font-size: 13px; font-weight:bold;">※ 주의: '127.0.0.1'이나 'localhost'로 접속된 상태에서는 <br>스마트폰에서 접속할 수 없습니다. PC의 내부 IP(예: 192.168.x.x)로 접속해주세요.</p>
        <button class="close-qr-btn" onclick="document.getElementById('qrModal').style.display='none'">닫기</button>
    </div>
</div>

<script>
    // 🌐 언어 매핑 확장
    const langNames = { 
        "ko": "🇰🇷 한국어", "id": "🇮🇩 인니어", "en": "🇺🇸 영어", "ja": "🇯🇵 일본어", "zh": "🇨🇳 중국어", 
        "vi": "🇻🇳 베트남어", "es": "🇪🇸 스페인어", "fr": "🇫🇷 프랑스어", "de": "🇩🇪 독일어", "th": "🇹🇭 태국어",
        "mn": "🇲🇳 몽골어", "uz": "🇺🇿 우즈베크어", "ru": "🇷🇺 러시아어", "ar": "🇸🇦 아랍어", "tl": "🇵🇭 필리핀어"
    };
    
    let ws = null, mediaRecorder = null, stream = null, isConnected = false;
    let authToken = ""; 
    let transcriptLog = "=== 실시간 현장 안전 지시 기록 ===\n\n";
    let currentSentenceId = null;

    const urlParams = new URLSearchParams(window.location.search);
    const roomToken = urlParams.get('room_token');

    if (roomToken) {
        authToken = roomToken;
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.body.classList.add('viewer-mode');
        setTimeout(() => toggleConnection('viewer'), 500);
    } else {
        const savedToken = localStorage.getItem('auth_token');
        const savedUser = localStorage.getItem('auth_user');
        if (savedToken) {
            authToken = savedToken;
            unlockApp(savedUser);
        }
    }

    // 💡 [핵심] 체크박스 상태에 따라 번역 창을 즉시 켜고 끄는 마법의 함수
    function updateWindows() {
        const container = document.getElementById('windowContainer');
        const checkedLangs = Array.from(document.querySelectorAll('#targetCheckboxes input:checked')).map(cb => cb.value);

        // 1. 체크된 언어의 창이 없으면 새로 만들기
        checkedLangs.forEach(lang => {
            let win = document.getElementById(`win_${lang}`);
            if (!win) {
                win = document.createElement('div');
                win.className = 'window';
                win.id = `win_${lang}`;
                win.innerHTML = `<h3>${langNames[lang] || lang}</h3><div id="box_${lang}" class="content-box"></div>`;
                container.appendChild(win);
            }
            win.style.display = 'flex'; // 화면에 보이기
        });

        // 2. 체크 해제된 창 숨기기 (기록 유지를 위해 DOM 삭제 대신 display: none 사용)
        Array.from(container.children).forEach(windowDiv => {
            const lang = windowDiv.id.replace('win_', '');
            if (!checkedLangs.includes(lang)) {
                windowDiv.style.display = 'none';
            }
        });

        // 3. 만약 마이크 방송 중(웹소켓 연결됨)이라면, 서버(백엔드)에 변경된 언어 목록을 실시간으로 쏴줌
        if (ws && ws.readyState === 1 && isConnected) {
            ws.send(JSON.stringify({ type: "config", targets: checkedLangs.join(',') }));
            console.log("🌐 서버로 타겟 언어 실시간 변경 요청 전송:", checkedLangs.join(','));
        }
    }

    // 창이 처음 열릴 때 기존 체크박스들에 이벤트 리스너(클릭 감지) 부착
    window.addEventListener('load', () => {
        document.querySelectorAll('#targetCheckboxes input').forEach(cb => {
            cb.addEventListener('change', updateWindows);
        });
        updateWindows(); // 최초 화면 렌더링
    });

    async function attemptLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const err = document.getElementById('errorMsg');

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();

            if (data.success) {
                authToken = data.token;
                localStorage.setItem('auth_token', authToken);
                localStorage.setItem('auth_user', data.username);
                unlockApp(data.username);
            } else {
                err.style.display = 'block';
                err.innerText = data.message;
            }
        } catch (e) {
            alert("서버와 연결할 수 없습니다. 서버가 켜져 있는지 확인하세요.");
        }
    }

    function unlockApp(username) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('userBadge').innerText = username + " 님";
    }

    function logout() {
        localStorage.removeItem('auth_token');
        localStorage.removeItem('auth_user');
        window.location.reload();
    }

    function showQRCode() {
        const currentUrl = window.location.href.split('?')[0];
        document.getElementById('currentUrlTxt').innerText = currentUrl;
        
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = ""; 
        
        const qrUrl = `${currentUrl}?room_token=${authToken}`;
        
        new QRCode(qrContainer, {
            text: qrUrl,
            width: 200, height: 200,
            colorDark : "#000000", colorLight : "#ffffff"
        });
        document.getElementById('qrModal').style.display = 'flex';
    }

    function exitViewerMode() {
        document.body.classList.remove('viewer-mode');
        if (isConnected) toggleConnection('viewer'); 
    }

    function triggerAlert() {
        document.body.style.backgroundColor = "#b71c1c";
        setTimeout(() => { document.body.style.backgroundColor = document.body.classList.contains('viewer-mode') ? "#000" : "#f4f6f9"; }, 300);
        setTimeout(() => { document.body.style.backgroundColor = "#b71c1c"; }, 600);
        setTimeout(() => { document.body.style.backgroundColor = document.body.classList.contains('viewer-mode') ? "#000" : "#f4f6f9"; }, 900);
        alert("⚠️ [관리자 경고] 즉시 현장 안전을 확보하세요!");
    }

    let isReporting = false;
    async function toggleReportMode() {
        if (!isReporting) {
            try {
                const reportStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(reportStream);
                mediaRecorder.ondataavailable = (e) => { if (ws && ws.readyState === 1) ws.send(e.data); };
                mediaRecorder.start(250);
                document.getElementById('reportBtn').innerText = "🛑 보고 종료";
                document.getElementById('reportBtn').style.backgroundColor = "#333";
                isReporting = true;
            } catch(e) { alert("마이크 권한이 필요합니다."); }
        } else {
            mediaRecorder.stop();
            document.getElementById('reportBtn').innerText = "🚨 위험 상황 보고";
            document.getElementById('reportBtn').style.backgroundColor = "#d32f2f";
            isReporting = false;
        }
    }

    function loadGlossaryFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('glossaryInput').value = e.target.result;
            alert("✅ 현장 안전 용어집 파일이 로드되었습니다.");
        };
        reader.readAsText(file, "UTF-8");
    }

    function clearAllLogs() {
        if (!confirm("화면의 모든 번역 내용을 삭제하시겠습니까?")) return;
        document.querySelectorAll('.content-box').forEach(box => box.innerHTML = '');
        transcriptLog = "=== 실시간 현장 안전 지시 기록 ===\n\n";
        document.getElementById('liveDictation').innerHTML = `<span class="placeholder-text">화면이 초기화되었습니다.</span>`;
    }

    function downloadTranscript() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([transcriptLog], { type: 'text/plain' }));
        a.download = `현장지시기록_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
    }

    function addExtraLanguage() {
        const select = document.getElementById('extraLangSelect');
        const langCode = select.value;
        if (document.querySelector(`input[value="${langCode}"]`)) return alert("이미 추가된 언어입니다.");
        const newLabel = document.createElement('label');
        newLabel.innerHTML = `<input type="checkbox" value="${langCode}" checked> ${langNames[langCode]}`;
        document.getElementById('targetCheckboxes').appendChild(newLabel);
        
        // 새로 추가된 체크박스에도 클릭 감지기 부착 및 창 즉시 띄우기
        newLabel.querySelector('input').addEventListener('change', updateWindows);
        updateWindows();
    }

    function speakTargetText(text, lang) {
        if (!window.speechSynthesis) return alert("음성 합성을 지원하지 않습니다.");
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance(text);
        if (lang === 'id') msg.lang = 'id-ID';
        else if (lang === 'en') msg.lang = 'en-US';
        else if (lang === 'ko') msg.lang = 'ko-KR';
        else msg.lang = lang; 
        window.speechSynthesis.speak(msg);
    }

    function updateStatus(text) {
        const box = document.getElementById('statusBox');
        box.innerText = text;
        if (text.includes("번역 중")) box.style.background = "#f39c12"; 
        else if (text.includes("방송 중")) box.style.background = "#28a745"; 
        else box.style.background = "#6c757d"; 
    }

    async function toggleConnection(role) {
        const speakerBtn = document.getElementById('speakerBtn');
        const viewerBtn = document.getElementById('viewerBtn');
        const targetLangs = Array.from(document.querySelectorAll('#targetCheckboxes input:checked')).map(cb => cb.value);
        
        if (targetLangs.length === 0) return alert("번역 화면을 선택해주세요!");

        if (!isConnected) {
            try {
                if (role === 'viewer') document.body.classList.add('viewer-mode');

                const spkLang = document.getElementById('speakerLang').value;
                const ep = document.getElementById('endpointingSlider').value;
                const mx = document.getElementById('maxCharSlider').value;

                // 보안 웹소켓 감지
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws?token=${authToken}&lang=${spkLang}&targets=${targetLangs.join(',')}&role=${role}&endpointing=${ep}&max_chars=${mx}`);
                
                ws.onopen = async () => {
                    isConnected = true;
                    if (role === 'speaker') {
                        // 처음 연결 시 용어집과 타겟 언어 설정을 서버에 쏨
                        ws.send(JSON.stringify({ type: "config", glossary: document.getElementById('glossaryInput').value, targets: targetLangs.join(',') }));
                        stream = await navigator.mediaDevices.getUserMedia({ audio: { noiseSuppression: true, echoCancellation: true } });
                        speakerBtn.innerText = "🛑 지시 종료";
                        speakerBtn.classList.add('active');
                        updateStatus("✅ 관리자 마이크 연결됨 (현장 방송 중)");
                        
                        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0 && ws.readyState === 1) ws.send(e.data); };
                        mediaRecorder.start(250); 
                    } else {
                        viewerBtn.innerText = "🛑 수신 종료";
                        viewerBtn.classList.add('active');
                        updateStatus("👀 작업자 모드 접속 완료");
                    }
                };

                ws.onmessage = (event) => {
                    const res = JSON.parse(event.data);
                    
                    if (res.type === "alert") triggerAlert();
                    else if (res.type === "interim") {
                        document.getElementById('liveDictation').innerText = "🗣️ " + res.text;
                        if (!currentSentenceId) currentSentenceId = "msg_" + Date.now();

                        // 듣는 중 회색 글씨는 현재 "체크된" 언어 창에만 뿌림
                        const currentTargets = Array.from(document.querySelectorAll('#targetCheckboxes input:checked')).map(cb => cb.value);
                        currentTargets.forEach(lang => {
                            const box = document.getElementById(`box_${lang}`);
                            if (box) {
                                let div = document.getElementById(`${currentSentenceId}_${lang}`);
                                if (!div) {
                                    div = document.createElement('div');
                                    div.id = `${currentSentenceId}_${lang}`;
                                    div.className = 'sentence';
                                    box.appendChild(div);
                                }
                                div.innerHTML = `<span class="draft-text">듣는 중 ✍️: ${res.text} ...</span>`;
                                box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
                            }
                        });
                    } else if (res.type === "status") {
                        updateStatus(res.text);
                    } else if (res.type === "translation") {
                        document.getElementById('liveDictation').innerHTML = `<span class="placeholder-text">현장 지시 대기 중...</span>`;
                        const data = res.data;
                        transcriptLog += `원문: ${data.original}\n`;

                        // 번역 완료 글씨는 서버가 보내준 모든 언어를 해당 창에 넣음 (창이 display:none 이라도 데이터는 들어감)
                        Object.keys(data.translations).forEach(lang => {
                            const box = document.getElementById(`box_${lang}`);
                            if (!box) return;
                            
                            const div = document.getElementById(`${currentSentenceId}_${lang}`) || document.createElement('div');
                            div.className = 'sentence';
                            div.id = ""; // ID 제거하여 다음 문장과 겹치지 않게 함
                            
                            const isSame = (res.source_lang === lang);
                            const transText = data.translations[lang];
                            const safeText = transText.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                            const ttsBtnHTML = `<button class="tts-btn" onclick="speakTargetText('${safeText}', '${lang}')">🔊 듣기</button>`;
                            
                            if (isSame) div.innerHTML = `<span class="same-lang-text">${transText}</span> ${ttsBtnHTML}`;
                            else div.innerHTML = `<span class="original-text">원문: ${data.original}</span><span class="latest-text">${transText}</span> ${ttsBtnHTML}`;
                            
                            if (!document.getElementById(`${currentSentenceId}_${lang}`)) box.appendChild(div);
                            transcriptLog += `- ${lang}: ${transText}\n`;
                            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
                        });
                        transcriptLog += `----------------------------------------\n`;
                        currentSentenceId = null; 
                    }
                };
                
                ws.onclose = (e) => {
                    if(e.code === 1008) {
                        alert("인증이 만료되었거나 유효하지 않습니다. 다시 로그인해주세요.");
                        logout();
                    } else resetUI();
                };
            } catch (err) { alert("연결 오류가 발생했습니다."); }
        } else {
            if (mediaRecorder) mediaRecorder.stop();
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (ws) ws.close();
            resetUI();
        }
    }

    function resetUI() {
        isConnected = false;
        document.body.classList.remove('viewer-mode');
        document.getElementById('speakerBtn').innerText = "🎤 [PC] 마이크 켜기";
        document.getElementById('viewerBtn').innerText = "👀 [스마트폰] 작업자 접속";
        document.getElementById('speakerBtn').classList.remove('active');
        document.getElementById('viewerBtn').classList.remove('active');
        updateStatus("시스템 대기 중");
    }
</script>
</body>
