<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 현장 안전 통역 콘솔</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-4 text-center">🚀 글로벌 현장 안전 통역 콘솔</h1>
        
        <!-- 로그인/제어 영역 -->
        <div id="loginArea" class="bg-white p-6 rounded-lg shadow-md mb-6">
            <input type="text" id="username" placeholder="관리자 ID" class="border p-2 rounded mb-2 w-full">
            <input type="password" id="password" placeholder="비밀번호" class="border p-2 rounded mb-2 w-full">
            <button onclick="login()" class="bg-blue-600 text-white px-4 py-2 rounded w-full">로그인</button>
            <div id="loginStatus" class="mt-2 text-red-500 font-bold"></div>
        </div>

        <div id="mainArea" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div id="box_ko" class="bg-white p-4 rounded shadow h-64 overflow-y-auto">
                    <h2 class="font-bold border-b mb-2">🇰🇷 한국어 (원문)</h2>
                </div>
                <div id="box_en" class="bg-white p-4 rounded shadow h-64 overflow-y-auto">
                    <h2 class="font-bold border-b mb-2">🇺🇸 영어</h2>
                </div>
                <div id="box_id" class="bg-white p-4 rounded shadow h-64 overflow-y-auto">
                    <h2 class="font-bold border-b mb-2">🇮🇩 인니어</h2>
                </div>
                <div id="box_vi" class="bg-white p-4 rounded shadow h-64 overflow-y-auto">
                    <h2 class="font-bold border-b mb-2">🇻🇳 베트남어</h2>
                </div>
            </div>
            <button id="micBtn" onclick="toggleMic()" class="bg-green-600 text-white px-6 py-3 rounded-full shadow-lg w-full text-lg">🎤 마이크 켜기</button>
            <div id="statusBtn" class="mt-4 p-2 bg-blue-100 text-center rounded">대기 중...</div>
        </div>
    </div>

    <script>
        let ws;
        let isMicOn = false;

        async function login() {
            const username = document.getElementById('username').value;
            const res = await fetch('/api/login', { method: 'POST', body: JSON.stringify({ username }) });
            const data = await res.json();
            if (data.success) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainArea').classList.remove('hidden');
                initWS(data.token);
            } else {
                document.getElementById('loginStatus').innerText = data.message;
            }
        }

        function initWS(token) {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws?token=${token}&lang=ko&targets=en,id,vi&role=speaker`);
            
            ws.onmessage = async (event) => {
                const res = JSON.parse(event.data);
                
                if (res.type === "status") {
                    const statusBtn = document.getElementById('statusBtn');
                    if (statusBtn) statusBtn.innerText = res.text;
                } 
                else if (res.type === "interim") {
                    const box = document.getElementById(`box_${res.source_lang}`);
                    if (box) {
                        if (!window.currentSentenceId) window.currentSentenceId = "msg_" + Date.now();
                        let div = document.getElementById(window.currentSentenceId);
                        if (!div) {
                            div = document.createElement('div');
                            div.id = window.currentSentenceId;
                            box.appendChild(div);
                        }
                        div.innerHTML = `<span style="color:gray;">듣는 중 ✍️: ${res.text}</span>`;
                        box.scrollTop = box.scrollHeight;
                    }
                } 
                else if (res.type === "translation") {
                    // 번역 완료 데이터를 모든 언어 창에 뿌림
                    const langs = ['ko', ...Object.keys(res.translations)];
                    langs.forEach(lang => {
                        const box = document.getElementById(`box_${lang}`);
                        if (box) {
                            // 기존 듣는 중이던 메시지가 있으면 제거하거나 덮어쓰기
                            let div = document.getElementById(window.currentSentenceId);
                            if (!div) {
                                div = document.createElement('div');
                                box.appendChild(div);
                            }
                            
                            const text = (lang === res.source_lang) ? res.original : (res.translations[lang] || res.original);
                            div.innerHTML = `<span style="color:#000; font-weight:bold; font-size:16px;">${text}</span>`;
                            box.scrollTop = box.scrollHeight;
                        }
                    });
                    window.currentSentenceId = null; // 초기화
                }
            };
        }

        async function toggleMic() {
            if (!isMicOn) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // 이 부분에 실제 오디오 스트리밍 전송 로직이 필요합니다.
                document.getElementById('micBtn').innerText = "🛑 마이크 끄기";
                document.getElementById('micBtn').classList.replace('bg-green-600', 'bg-red-600');
                isMicOn = true;
            } else {
                window.location.reload();
            }
        }
    </script>
</body>
</html>
