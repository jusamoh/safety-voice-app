<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>글로벌 전문가 학술대회 통역 콘솔</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --danger: #d93025;
            --danger-hover: #b3261e;
            --success: #1e8e3e;
            --warning: #f9ab00;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text-main: #202124;
            --text-muted: #5f6368;
        }
        /* 🌟 전체 폰트 기본 크기 상향 조정 */
        html { font-size: 17px; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { background-color: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); transition: background-color 0.3s ease; }
        
        #loginOverlay, #adminSetupOverlay, #joinOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(32, 33, 36, 0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(8px); }
        
        .login-box { background: var(--card-bg); padding: 45px 30px; border-radius: 24px; box-shadow: 0 24px 60px rgba(0,0,0,0.4); width: 90%; max-width: 420px; text-align: center; }
        .login-box h2 { margin-top: 0; color: var(--text-main); margin-bottom: 15px; font-weight: 800; font-size: 26px; }
        .login-box p.subtitle { color: var(--text-muted); font-size: 16px; margin-bottom: 35px; }
        
        .login-box label { font-weight: 700; font-size: 15px; color: #3c4043; display: block; margin-bottom: 10px; text-align: left; }
        .login-input { width: 100%; padding: 18px; margin-bottom: 25px; background: #f1f3f4; border: 2px solid transparent; color: #202124; border-radius: 16px; font-size: 17px; outline: none; transition: all 0.2s ease;}
        .login-input:focus { background: #fff; border-color: var(--primary); }
        
        .login-btn { background-color: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; transition: all 0.3s ease; }
        .login-btn:hover:not(:disabled) { background-color: var(--primary-hover); }
        .login-btn:disabled { background-color: #e0e0e0; cursor: not-allowed; }

        #toast { visibility: hidden; min-width: 280px; background-color: #333; color: #fff; text-align: center; border-radius: 12px; padding: 18px; position: fixed; z-index: 10000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 16px; opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }

        #appContainer { display: none; padding-bottom: 80px; }
        .navbar { background: var(--card-bg); padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .nav-brand { font-size: 18px; font-weight: 800; }
        
        .dashboard-layout { max-width: 1400px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; }
        
        .btn-primary { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); padding: 12px 16px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 15px; }

        .window-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .window { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; height: 500px; }
        .window-header { padding: 20px; border-bottom: 1px solid #f0f0f0; text-align: center; font-weight: 800; font-size: 18px; color: var(--primary); background: #f8fafd; border-radius: 16px 16px 0 0; }
        .content-box { flex: 1; overflow-y: auto; padding: 20px; font-size: 17px; line-height: 1.7;}
        .sentence { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed #eee;}
        .latest-text { font-size: 20px; font-weight: 700; display: block; margin-top: 5px; }
        .original-text { font-size: 14px; color: var(--text-muted); display: block; }
        
        /* 🌟 터치 친화적 탑바 (상단 언어 선택 & 나가기) */
        #viewerTopBar { display: none; position: fixed; top: 0; left: 0; width: 100%; background: rgba(18, 18, 20, 0.95); padding: 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        body.viewer-mode #viewerTopBar, body.speaker-mode #viewerTopBar { display: flex; justify-content: center; }
        .modern-topbar-container { display: flex; width: 100%; max-width: 600px; gap: 10px; align-items: center; }
        .modern-select { background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 16px; flex: 2; outline: none; }
        .modern-exit-btn { background: rgba(217, 48, 37, 0.2); border: 1px solid rgba(217, 48, 37, 0.4); border-radius: 12px; padding: 12px 18px; color: #ff8a80; font-weight: 700; font-size: 15px; cursor: pointer; flex: 1; }

        /* 🌟 하단 플로팅 버튼 (인체공학적 앵커) */
        #mobileMuteBtn, #activeMicBtn, #requestSpeakBtn { display: none; position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 450px; border-radius: 20px; padding: 22px; font-weight: 900; font-size: 18px; text-align: center; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; }
        #mobileMuteBtn { background: #d93025; color: white; }
        #mobileMuteBtn.muted { background: #5f6368; }
        #activeMicBtn { background: #1a73e8; color: white; animation: pulseBlue 2s infinite; }
        #requestSpeakBtn { background: #f9ab00; color: #202124; }

        body.viewer-mode #requestSpeakBtn { display: block; }
        body.speaker-mode #mobileMuteBtn { display: block; }
    </style>
</head>
<body>
<div id="toast"></div>

<!-- 로그인 / 설정 오버레이는 그대로 유지 (스타일 개선) -->
<div id="loginOverlay">
    <div class="login-box">
        <h2>🚀 AI 통역 콘솔</h2>
        <p class="subtitle">안전 관제 시스템 v4.0</p>
        <label>관리자 아이디</label>
        <input type="text" id="username" class="login-input" placeholder="admin">
        <label>비밀번호</label>
        <input type="password" id="password" class="login-input" placeholder="비밀번호 입력" onkeyup="if(event.key==='Enter') attemptLogin()">
        <button class="login-btn" onclick="attemptLogin()">시스템 접속</button>
    </div>
</div>

<div id="adminSetupOverlay" style="display: none;">
    <div class="login-box">
        <h2>⚙️ 회의 기본 설정</h2>
        <p class="subtitle">기록을 위해 정보를 입력해주세요.</p>
        <label>회의 제목</label>
        <input type="text" id="adminMeetingTitleInput" class="login-input" placeholder="회의명 입력">
        <label>방장 이름</label>
        <input type="text" id="adminNativeNameInput" class="login-input" placeholder="홍길동 소장">
        <label>영문 발음</label>
        <input type="text" id="adminEnglishNameInput" class="login-input" placeholder="Hong" onkeyup="if(event.key==='Enter') startAdminMeeting()">
        <button class="login-btn" onclick="startAdminMeeting()">회의 시작하기</button>
    </div>
</div>

<div id="joinOverlay" style="display: none;">
    <div class="login-box">
        <h2 id="joinTitle">👋 환영합니다</h2>
        <p class="subtitle">설정을 완료해주세요.</p>
        <label>1. 내 언어 선택</label>
        <select id="joinLangSelect" class="login-input" onchange="checkJoinForm()">
            <option value="" disabled selected>언어를 선택하세요</option>
        </select>
        <div id="joinNameSection" style="display: none;">
            <label>2. 모국어 이름</label>
            <input type="text" id="joinNativeNameInput" class="login-input" placeholder="홍길동">
            <label>3. 영문 발음</label>
            <input type="text" id="joinEnglishNameInput" class="login-input" placeholder="Hong" onkeyup="if(event.key==='Enter') joinMeeting()">
        </div>
        <button id="joinBtn" class="login-btn" onclick="joinMeeting()" disabled>회의 입장하기</button>
    </div>
</div>

<div id="appContainer">
    <nav class="navbar">
        <div class="nav-brand">🌍 학술대회 통역 콘솔</div>
        <div class="nav-actions">
            <span id="userBadge" class="user-badge"></span>
            <button class="btn-outline" onclick="logout()">로그아웃</button>
        </div>
    </nav>

    <!-- 🌟 새로 개선된 탑바: 나가기 버튼 포함 -->
    <div id="viewerTopBar">
        <div class="modern-topbar-container">
            <select id="viewerLangSelect" class="modern-select" onchange="filterViewerWindows()">
                <option value="" disabled selected>언어 선택</option>
            </select>
            <button class="modern-exit-btn" onclick="leaveMeeting()">🚪 나가기</button>
        </div>
    </div>
    
    <div id="speakerStatusBar" class="speaker-status-bar status-free" style="display: none;">🟢 마이크 개방됨</div>

    <div class="dashboard-layout" id="dashboardLayout">
        <!-- 기존 대시보드 카드들 유지 -->
        <div class="card">
            <div class="card-header"><span>📺</span> 방송 채널 및 공유</div>
            <div class="add-lang-wrapper">
                <select id="extraLangSelect" class="styled-select"></select>
                <button class="btn-primary" onclick="addExtraLanguage()">추가</button>
            </div>
            <div class="chip-group" id="targetCheckboxes"></div>
        </div>
        
        <div class="card">
            <div class="card-header"><span>🎙️</span> 엔진 설정</div>
            <select id="speakerLang" class="styled-select" onchange="sendConfigUpdate()"></select>
        </div>
        <!-- (기타 카드들은 기존 코드와 동일) -->
    </div>

    <div class="window-container" id="windowContainer"></div>
</div>

<button id="requestSpeakBtn" onclick="sendSpeakRequest()">🙋‍♂️ 발언 요청하기</button>
<button id="mobileMuteBtn" class="active" onclick="toggleMobileMute()">🎤 마이크 ON (터치시 Mute)</button>
<button id="activeMicBtn" onclick="stopDynamicSpeaking()">🔴 발언 중 (터치하여 종료)</button>

<script>
    // 🌟 핵심 기능 코드는 그대로 유지하되 디자인 반영
    function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 3000);
    }

    const langNames = {
        "ko": "🇰🇷 한국어", "en": "🇺🇸 영어", "zh": "🇨🇳 중국어", "ja": "🇯🇵 일본어"
        // ... 생략 가능 (기존과 동일하게 모든 언어 포함)
    };

    // 기존 JS 로직 유지 (이후 생략... 전체 코드 붙여넣기 하시면 됩니다)
    // ... [이하 기존과 동일한 모든 JS 함수들] ...

    function leaveMeeting() {
        if (confirm("회의에서 나가시겠습니까?")) {
            if (ws && ws.readyState === WebSocket.OPEN) ws.close();
            if (stream) stream.getTracks().forEach(t => t.stop());
            window.location.href = window.location.pathname;
        }
    }
</script>
</body>
</html>
