<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 환경에 완벽 대응하는 반응형 Viewport 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>글로벌 현장 안전 통역 콘솔</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        
        .glass-card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); border: 1px solid #e5e7eb; padding: 24px; }
        
        /* 버튼 스타일 */
        .btn-primary { background: #2563eb; color: white; transition: all 0.2s; border-radius: 8px; font-weight: 600; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .btn-primary:active { transform: translateY(0); }
        
        /* 마이크 버튼 애니메이션 (녹음 중) */
        .mic-btn { background: #3b82f6; color: white; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 9999px; }
        .mic-btn.active { background: #ef4444; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* 전체 음소거 (소장 제어) 버튼 시각적 피드백 */
        .mute-btn { transition: all 0.2s; border: 1px solid #d1d5db; background: white; color: #4b5563; }
        .mute-btn.active { border: 2px solid #000; background-color: #f9fafb; color: #000; font-weight: 700; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .mute-btn.inactive { opacity: 0.4; }

        /* 3번 방식: 마이크 연결 완료 시 화면 번쩍임 효과 */
        @keyframes flashSuccess { 
            0% { background-color: #10b981; transform: scale(1.02); box-shadow: 0 0 25px rgba(16, 185, 129, 0.6); color: white; border-color: #10b981; } 
            100% { background-color: #f3f4f6; transform: scale(1); box-shadow: 0 0 0 rgba(0,0,0,0); color: #374151; border-color: #e5e7eb; } 
        }
        .flash-active { animation: flashSuccess 1s ease-out !important; }

        /* 타겟 언어 칩(Chip) 디자인 */
        .chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; background: #dbeafe; color: #1e40af; font-size: 0.875rem; font-weight: 600; margin: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .chip button { margin-left: 8px; color: #1e3a8a; display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; transition: background 0.2s; }
        .chip button:hover { background: #bfdbfe; color: #dc2626; }

        /* 고급 토스트 알림 (alert 대체) */
        #toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: #1f2937; color: white; padding: 14px 24px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 500; text-align: center; }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* 모바일 청중용 하단 플로팅 발언 버튼 */
        #requestSpeakBtn { display: none; position: fixed; bottom: 30px; right: 20px; background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border-radius: 30px; padding: 16px 28px; z-index: 1000; border: none; font-weight: 700; box-shadow: 0 8px 25px rgba(220, 38, 38, 0.4); transition: transform 0.2s; }
        #requestSpeakBtn:active { transform: scale(0.95); }
        
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="md:p-8 p-4">

<!-- 로그인 오버레이 -->
<div id="loginOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50 backdrop-blur-sm">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm transform transition-all">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">현장 안전 통역 콘솔</h2>
            <p class="text-gray-500 text-sm mt-2">관리자 또는 게스트로 로그인하세요</p>
        </div>
        <input type="text" id="username" placeholder="아이디" class="w-full mb-4 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        <input type="password" id="password" placeholder="비밀번호" class="w-full mb-6 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        <button onclick="performLogin()" class="w-full btn-primary py-3 text-lg">안전하게 로그인</button>
    </div>
</div>

<!-- 메인 애플리케이션 컨테이너 -->
<div id="appContainer" class="max-w-7xl mx-auto hidden flex-col gap-6">
    
    <!-- 헤더 영역 -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-2">
        <div>
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">🌐 실시간 안전 동시통역</h1>
            <p class="text-gray-500 mt-1" id="userInfoDisplay">연결 대기 중...</p>
        </div>
        <div class="flex gap-3 w-full md:w-auto">
            <button onclick="logout()" class="px-5 py-2.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-semibold transition w-full md:w-auto">🔒 로그아웃</button>
        </div>
    </div>

    <!-- 반응형 2단 그리드 (좌측: 제어/설정, 우측: 통역 결과) -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- 좌측 제어 패널 (LG 화면에서 1칸 차지) -->
        <div class="lg:col-span-1 flex flex-col gap-6" id="adminPanel">
            
            <!-- [언어 설정 카드] 언어 추가 & 칩 UI -->
            <div class="glass-card">
                <h3 class="text-lg font-bold mb-4 flex items-center"><span class="text-blue-500 mr-2">1</span> 언어 방송 설정</h3>
                
                <label class="block text-sm font-semibold text-gray-700 mb-2">발화자(소장) 언어</label>
                <select id="spkLang" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg mb-4 focus:ring-2 focus:ring-blue-500">
                    <option value="ko" selected>🇰🇷 한국어 (Korean)</option>
                    <option value="en">🇺🇸 영어 (English)</option>
                    <option value="multi">🌐 다국어 자동 감지</option>
                </select>

                <label class="block text-sm font-semibold text-gray-700 mb-2">번역 송출 언어 추가</label>
                <div class="flex gap-2 mb-4">
                    <select id="addLangDropdown" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="id">🇮🇩 인도네시아어</option>
                        <option value="vi">🇻🇳 베트남어</option>
                        <option value="en">🇺🇸 영어</option>
                        <option value="zh">🇨🇳 중국어</option>
                        <option value="ja">🇯🇵 일본어</option>
                    </select>
                    <button onclick="addTargetLang()" class="btn-primary px-4 whitespace-nowrap">추가</button>
                </div>
                
                <div class="p-3 bg-gray-50 rounded-lg min-h-[60px] border border-gray-200">
                    <p class="text-xs text-gray-500 mb-2 font-medium">현재 방송 중인 언어 채널:</p>
                    <div id="selectedLangsContainer" class="flex flex-wrap gap-1">
                        <!-- 동적으로 칩이 생성됩니다 -->
                    </div>
                </div>
            </div>

            <!-- [마이크 제어권 카드] (소장용) -->
            <div class="glass-card" id="floorControlCard">
                <h3 class="text-lg font-bold mb-4 flex items-center"><span class="text-red-500 mr-2">2</span> 마이크 제어권 (회의 통제)</h3>
                <div class="flex gap-2 mb-4">
                    <button id="muteOnBtn" onclick="toggleMute(true)" class="mute-btn inactive flex-1 py-3 rounded-lg text-sm">전체 음소거 (소장만 발언)</button>
                    <button id="muteOffBtn" onclick="toggleMute(false)" class="mute-btn active flex-1 py-3 rounded-lg text-sm">✔️ 자유 토론 (해제)</button>
                </div>
                <div id="requestQueue" class="space-y-2 mt-4 max-h-[150px] overflow-y-auto">
                    <p class="text-sm text-gray-500 text-center py-2">발언을 요청한 작업자가 없습니다.</p>
                </div>
            </div>

            <!-- [용어집 카드] -->
            <div class="glass-card">
                <h3 class="text-lg font-bold mb-3 flex items-center"><span class="text-green-500 mr-2">3</span> 현장 안전 용어집</h3>
                <p class="text-xs text-gray-500 mb-2">예: 아시바=Scaffolding, 개구부=Opening</p>
                <textarea id="glossaryInput" onblur="updateConfig()" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm h-24 focus:ring-2 focus:ring-green-500" placeholder="용어를 입력하면 AI 번역에 즉시 강제 적용됩니다."></textarea>
            </div>
            
            <!-- [QR 코드 생성기] -->
            <div class="glass-card text-center" id="qrCard">
                <h3 class="text-lg font-bold mb-4">모바일 접속 QR코드</h3>
                <div class="flex flex-col gap-2">
                    <button onclick="showQR('viewer')" class="btn-primary py-3 text-sm">👀 청중(뷰어)용 QR코드 띄우기</button>
                    <button onclick="showQR('speaker')" class="py-3 text-sm border-2 border-orange-500 text-orange-600 rounded-lg hover:bg-orange-50 font-bold transition">🎙️ 토론자(패널)용 QR 띄우기</button>
                </div>
            </div>

        </div>

        <!-- 우측 통역 패널 (LG 화면에서 2칸 차지) -->
        <div class="lg:col-span-2 flex flex-col gap-6">
            
            <!-- 마이크 버튼 및 상태 배너 -->
            <div class="glass-card flex flex-col items-center justify-center py-8">
                <button id="micBtn" onclick="toggleMicrophone()" class="mic-btn w-24 h-24 flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                </button>
                <div id="statusBanner" class="w-full bg-gray-100 border border-gray-200 text-gray-700 text-center py-4 rounded-xl font-bold text-lg transition-all duration-300">
                    마이크가 꺼져 있습니다
                </div>
            </div>

            <!-- 실시간 통역 텍스트 출력 창 -->
            <div class="glass-card flex-1 flex flex-col min-h-[400px]">
                <div class="flex justify-between items-center mb-4 pb-3 border-b border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800">실시간 통역 스크립트</h3>
                    <button onclick="saveTranscript()" class="text-blue-600 font-semibold hover:text-blue-800 text-sm bg-blue-50 px-3 py-1.5 rounded-lg transition">
                        📄 기록 저장 (.txt)
                    </button>
                </div>
                <!-- 텍스트가 쌓이는 박스 -->
                <div id="transcriptBox" class="flex-1 overflow-y-auto space-y-4 p-2 bg-gray-50 rounded-lg inner-shadow">
                    <div class="text-center text-gray-400 mt-10 text-sm font-medium">대기 중... 마이크를 켜면 번역이 시작됩니다.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- QR 모달 -->
<div id="qrModal" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden items-center justify-center z-50 backdrop-blur-sm">
    <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full relative">
        <button onclick="closeQRModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 font-bold text-xl">&times;</button>
        <h3 id="qrModalTitle" class="text-xl font-bold mb-2">접속 QR코드</h3>
        <p class="text-gray-500 text-sm mb-6">스마트폰 카메라로 스캔하여 접속하세요</p>
        <img id="qrImage" src="" alt="QR" class="mx-auto border border-gray-200 rounded-xl shadow-sm mb-4">
        <p id="qrUrlText" class="text-xs text-blue-500 break-all bg-blue-50 p-2 rounded-lg"></p>
    </div>
</div>

<!-- 토스트 알림 컨테이너 -->
<div id="toast-container"></div>

<!-- 모바일 청중용 플로팅 발언 버튼 -->
<button id="requestSpeakBtn" onclick="requestSpeak()">🎤 발언하기 (누르고 말하세요)</button>

<script>
    let ws;
    let stream;
    let mediaRecorder;
    let authToken = null;
    let role = "viewer";
    let clientId = "usr_" + Math.random().toString(36).substr(2, 6);
    let username = "";
    
    // 타겟 언어 관리 (언어 칩 시스템)
    let targetLangs = ['id', 'vi']; // 기본 언어
    const langNames = { 'ko': '한국어', 'en': '영어', 'id': '인도네시아어', 'vi': '베트남어', 'zh': '중국어', 'ja': '일본어' };

    // ---------------------------------------------------
    // 💡 토스트 알림 (alert 대체)
    // ---------------------------------------------------
    function showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        container.appendChild(toast);
        
        // 애니메이션 트리거
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400); // fade out 애니메이션 시간 대기 후 제거
        }, 3000);
    }

    // ---------------------------------------------------
    // 💡 언어 칩(Chip) 렌더링 로직
    // ---------------------------------------------------
    function renderLangChips() {
        const container = document.getElementById('selectedLangsContainer');
        container.innerHTML = '';
        
        if (targetLangs.length === 0) {
            container.innerHTML = '<span class="text-gray-400 text-xs py-1">선택된 언어가 없습니다.</span>';
            return;
        }

        targetLangs.forEach(lang => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerHTML = `${langNames[lang] || lang} <button onclick="removeLang('${lang}')">✕</button>`;
            container.appendChild(chip);
        });
    }

    function addTargetLang() {
        const select = document.getElementById('addLangDropdown');
        const val = select.value;
        if (!targetLangs.includes(val)) {
            targetLangs.push(val);
            renderLangChips();
            updateConfig();
            showToast(`${langNames[val]} 채널이 추가되었습니다.`);
        } else {
            showToast('이미 추가된 언어입니다.');
        }
    }

    function removeLang(lang) {
        targetLangs = targetLangs.filter(l => l !== lang);
        renderLangChips();
        updateConfig();
    }

    // ---------------------------------------------------
    // 💡 음소거 제어 시각적 피드백 (검은색 체크 마크)
    // ---------------------------------------------------
    let isAdminMuted = false;
    function toggleMute(muteState) {
        if (role !== 'admin') return;
        
        isAdminMuted = muteState;
        const onBtn = document.getElementById('muteOnBtn');
        const offBtn = document.getElementById('muteOffBtn');
        
        if (isAdminMuted) {
            onBtn.classList.add('active'); onBtn.classList.remove('inactive');
            onBtn.innerHTML = '✔️ 전체 음소거 (소장만 발언)';
            
            offBtn.classList.add('inactive'); offBtn.classList.remove('active');
            offBtn.innerHTML = '자유 토론 (해제)';
        } else {
            offBtn.classList.add('active'); offBtn.classList.remove('inactive');
            offBtn.innerHTML = '✔️ 자유 토론 (해제)';
            
            onBtn.classList.add('inactive'); onBtn.classList.remove('active');
            onBtn.innerHTML = '전체 음소거 (소장만 발언)';
        }
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'admin_action', action: isAdminMuted ? 'mute_all' : 'unmute_all' }));
            showToast(isAdminMuted ? "모두의 마이크를 껐습니다 (소장 단독 발언)" : "자유 토론 모드로 변경되었습니다.");
        }
    }

    // ---------------------------------------------------
    // 💡 상태 배너 제어
    // ---------------------------------------------------
    function updateStatus(text, isActive = false) {
        const banner = document.getElementById('statusBanner');
        banner.textContent = text;
        if (isActive) {
            banner.classList.remove('bg-gray-100', 'text-gray-700', 'border-gray-200');
            banner.classList.add('bg-blue-50', 'text-blue-700', 'border-blue-200');
        } else {
            banner.classList.remove('bg-blue-50', 'text-blue-700', 'border-blue-200');
            banner.classList.add('bg-gray-100', 'text-gray-700', 'border-gray-200');
        }
    }

    // ---------------------------------------------------
    // 💡 로그인 및 웹소켓 연결
    // ---------------------------------------------------
    async function performLogin() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        
        if(!u || !p) { showToast("아이디와 비밀번호를 입력하세요."); return; }
        
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            
            if (data.success) {
                authToken = data.token;
                username = data.username;
                role = (username === 'admin') ? 'admin' : (username === 'speaker' ? 'speaker' : 'viewer');
                
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                document.getElementById('appContainer').classList.add('flex');
                
                let roleKor = role === 'admin' ? "👑 총괄 소장 (Admin)" : (role === 'speaker' ? "🎙️ 패널 (Speaker)" : "👀 작업자 (Viewer)");
                document.getElementById('userInfoDisplay').textContent = `${roleKor} - 접속 완료`;
                
                if(role !== 'admin') {
                    document.getElementById('adminPanel').style.display = 'none';
                    if(role === 'viewer') {
                        document.getElementById('requestSpeakBtn').style.display = 'block';
                    }
                }
                
                renderLangChips(); // 칩 초기화
                connectWebSocket();
            } else {
                showToast(data.message || "로그인 실패");
            }
        } catch(e) {
            showToast("서버 연결에 실패했습니다.");
        }
    }

    function logout() {
        if(ws) ws.close();
        authToken = null;
        window.location.reload();
    }

    function connectWebSocket() {
        if (ws) ws.close();
        
        const spkLang = document.getElementById('spkLang') ? document.getElementById('spkLang').value : 'ko';
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        
        // 🚨 endpointing, max_chars 파라미터는 백엔드에서 500ms, 35단어 등으로 기본값 강제 처리됨
        ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws?token=${authToken}&lang=${spkLang}&targets=${targetLangs.join(',')}&role=${role}&endpointing=500&max_chars=35&client_id=${clientId}&name=${encodeURIComponent(username)}`);
        
        ws.onopen = () => {
            showToast("서버와 실시간 연결되었습니다.");
            if(role === 'admin') updateConfig();
        };
        
        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                handleServerMessage(msg);
            } catch(e) { console.error("메시지 파싱 에러", e); }
        };
        
        ws.onclose = () => {
            updateStatus("서버 연결이 끊어졌습니다. 재접속 중...", false);
            setTimeout(connectWebSocket, 3000);
        };
    }

    // ---------------------------------------------------
    // 💡 마이크 제어 및 화면 번쩍임 (Flash) 로직
    // ---------------------------------------------------
    async function toggleMicrophone() {
        const btn = document.getElementById('micBtn');
        const isActive = btn.classList.contains('active');
        
        if (isActive) {
            // 마이크 끄기
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            btn.classList.remove('active');
            updateStatus("마이크가 꺼져 있습니다.", false);
        } else {
            // 마이크 켜기
            try {
                if(role === 'admin') updateConfig();
                
                stream = await navigator.mediaDevices.getUserMedia({ audio: { noiseSuppression: true, echoCancellation: true } });
                
                // 마이크 켜기 버튼 애니메이션 활성화
                btn.classList.add('active');
                updateStatus("✅ 마이크 연결 완료! 말씀을 시작하세요.", true);
                
                // [시각적 신호] 마이크 연결 즉시 상태바 번쩍임 효과 (3번 방식)
                const statusBanner = document.getElementById('statusBanner');
                if (statusBanner) {
                    statusBanner.classList.remove('flash-active');
                    void statusBanner.offsetWidth; // 브라우저 애니메이션 강제 리셋 (리플로우)
                    statusBanner.classList.add('flash-active');
                }
                
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                mediaRecorder.ondataavailable = (e) => { 
                    if (e.data.size > 0 && ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(e.data);
                    }
                };
                mediaRecorder.start(200); // 0.2초 단위로 오디오 조각 전송
                
            } catch (err) {
                console.error("마이크 에러:", err);
                showToast("마이크 권한을 허용해주세요!");
            }
        }
    }

    // ---------------------------------------------------
    // 💡 서버 메시지 처리 (렌더링)
    // ---------------------------------------------------
    function handleServerMessage(msg) {
        if (msg.type === "status") {
            // 서버에서 보내는 상태 메시지 (다국어 번역 중... 등)
            const banner = document.getElementById('statusBanner');
            if(banner && banner.textContent !== "✅ 마이크 연결 완료! 말씀을 시작하세요.") {
                 updateStatus(msg.text, true);
            }
        } 
        else if (msg.type === "interim") {
            renderMessage(msg.msg_id, "원문(STT)", msg.text, "text-gray-500 italic");
        } 
        else if (msg.type === "stream_update") {
            renderMessage(msg.msg_id + "_" + msg.lang, `번역 (${langNames[msg.lang] || msg.lang})`, msg.text, "text-blue-600 font-semibold");
        } 
        else if (msg.type === "stream_end") {
            renderMessage(msg.msg_id + "_" + msg.lang, `번역 (${langNames[msg.lang] || msg.lang})`, msg.text, "text-gray-800 font-bold text-lg border-l-4 border-blue-500 pl-3 bg-blue-50 p-2 rounded");
        } 
        else if (msg.type === "sentence_complete") {
             // 문장이 완전히 끝남
        } 
        else if (msg.type === "alert") {
            // 긴급 경보
            document.body.style.backgroundColor = "#fee2e2";
            setTimeout(() => document.body.style.backgroundColor = "", 500);
            showToast("🚨 긴급 안전 경보 감지!");
        }
        else if (msg.type === "admin_state" && role === 'admin') {
            const queue = document.getElementById('requestQueue');
            queue.innerHTML = '';
            if (msg.requests.length === 0) {
                queue.innerHTML = '<p class="text-sm text-gray-500 text-center py-2">요청 대기열이 비어있습니다.</p>';
            } else {
                msg.requests.forEach(r => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center bg-white border border-gray-200 p-2 rounded-lg";
                    div.innerHTML = `
                        <span class="text-sm font-semibold">${r.name}</span>
                        <div class="flex gap-2">
                            <button onclick="approveRequest('${r.id}')" class="px-3 py-1 bg-green-500 text-white rounded text-xs">승인</button>
                            <button onclick="rejectRequest('${r.id}')" class="px-3 py-1 bg-gray-400 text-white rounded text-xs">거절</button>
                        </div>
                    `;
                    queue.appendChild(div);
                });
            }
        }
        else if (msg.type === "speak_approved" && role === 'viewer') {
            document.getElementById('requestSpeakBtn').innerText = "🛑 발언 중... (누르면 종료)";
            document.getElementById('requestSpeakBtn').style.background = "linear-gradient(135deg, #10b981, #059669)";
            document.body.classList.add('speaker-mode');
            toggleMicrophone();
            showToast("소장님이 발언을 승인했습니다!");
        }
    }

    function renderMessage(id, label, text, cssClasses) {
        const box = document.getElementById('transcriptBox');
        
        // "대기 중..." 초기 텍스트 삭제
        const initText = box.querySelector('.text-gray-400');
        if(initText) initText.remove();

        let div = document.getElementById(id);
        if (!div) {
            div = document.createElement('div');
            div.id = id;
            div.className = "mb-3 p-3 bg-white rounded-lg shadow-sm border border-gray-100 transition-all";
            box.appendChild(div);
        }
        div.innerHTML = `<div class="text-xs font-bold text-gray-400 mb-1 tracking-wider uppercase">${label}</div><div class="${cssClasses}">${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function updateConfig() {
        if (ws && ws.readyState === WebSocket.OPEN && role === 'admin') {
            const glossary = document.getElementById('glossaryInput') ? document.getElementById('glossaryInput').value : '';
            ws.send(JSON.stringify({ 
                type: 'config', 
                glossary: glossary, 
                targets: targetLangs.join(',') 
            }));
        }
    }

    // ---------------------------------------------------
    // 💡 관리자 제어 (Admin Actions)
    // ---------------------------------------------------
    function approveRequest(id) {
        if(ws) ws.send(JSON.stringify({type: "admin_action", action: "approve", target_id: id}));
    }
    function rejectRequest(id) {
        if(ws) ws.send(JSON.stringify({type: "admin_action", action: "reject", target_id: id}));
    }

    // ---------------------------------------------------
    // 💡 청중 발언권 요청 (Viewer)
    // ---------------------------------------------------
    function requestSpeak() {
        const btn = document.getElementById('requestSpeakBtn');
        if (document.body.classList.contains('speaker-mode')) {
            // 발언 종료
            toggleMicrophone();
            btn.innerText = "🎤 발언하기 (누르고 말하세요)";
            btn.style.background = "linear-gradient(135deg, #ef4444, #dc2626)";
            document.body.classList.remove('speaker-mode');
        } else {
            // 요청 전송
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: "request_speak"}));
                btn.innerText = "⏳ 승인 대기 중...";
                btn.style.background = "linear-gradient(135deg, #fbbf24, #d97706)";
            }
        }
    }

    // ---------------------------------------------------
    // 💡 유틸리티 (QR 생성 및 회의록 저장)
    // ---------------------------------------------------
    function showQR(qrRole) {
        const modal = document.getElementById('qrModal');
        const img = document.getElementById('qrImage');
        const title = document.getElementById('qrModalTitle');
        const urlText = document.getElementById('qrUrlText');
        
        // 현재 외부망 접속이 가능하도록 브라우저 주소 기반 URL 생성 (클라우드 환경 대응)
        const baseUrl = window.location.origin; 
        const params = new URLSearchParams({ role: qrRole });
        const url = `${baseUrl}/?${params.toString()}`;
        
        title.textContent = qrRole === 'speaker' ? "토론자(패널)용 접속 QR" : "일반 청중(뷰어)용 접속 QR";
        // Google Chart API를 이용한 QR 코드 생성 (무료, 안정적)
        img.src = `https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=${encodeURIComponent(url)}`;
        urlText.textContent = url;
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }
    
    function closeQRModal() {
        const modal = document.getElementById('qrModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function saveTranscript() {
        const box = document.getElementById('transcriptBox');
        let text = "=== 현장 안전 회의록 ===\n\n";
        
        const divs = box.querySelectorAll('div[id]');
        divs.forEach(div => {
            const label = div.querySelector('div.text-xs').innerText;
            const content = div.querySelector('div:nth-child(2)').innerText;
            text += `[${label}]\n${content}\n\n`;
        });
        
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `회의록_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
        showToast("회의록 파일이 다운로드 되었습니다.");
    }
</script>
